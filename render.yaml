services:
  - type: web
    name: smart-jyotishi-backend
    env: python
    rootDir: nepali-jyotish-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production

      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        generateValue: true

      - key: ANTHROPIC_API_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false
